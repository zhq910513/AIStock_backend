services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: qee
      POSTGRES_USER: qee
      POSTGRES_PASSWORD: qee_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - qee_pgdata:/var/lib/postgresql/data

  backend:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  qee_pgdata:
