version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aistock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/aistock
      IFIND_HTTP_TOKEN: ${IFIND_HTTP_TOKEN:-}
      DATA_PROVIDER: ${DATA_PROVIDER:-IFIND_HTTP}
      ORCH_SYMBOLS: ${ORCH_SYMBOLS:-000001.SZ,600000.SH}
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  pgdata:
